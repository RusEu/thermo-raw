<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Light gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>

    <!-- Gradient for the spectrum peaks -->
    <linearGradient id="spectrumGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>

    <!-- Gradient for the flame/heat effect -->
    <linearGradient id="flameGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#64748b" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#cbd5e1" stroke-width="4"/>

  <!-- Grid lines -->
  <line x1="80" y1="400" x2="432" y2="400" stroke="#94a3b8" stroke-width="2" opacity="0.4"/>
  <line x1="80" y1="320" x2="432" y2="320" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="#94a3b8" stroke-width="1" opacity="0.15"/>

  <!-- Spectrum peaks (representing mass spec data) -->
  <g filter="url(#glow)">
    <!-- Peak 1 -->
    <rect x="100" y="280" width="24" height="120" rx="4" fill="url(#spectrumGradient)" opacity="0.7"/>
    <!-- Peak 2 -->
    <rect x="140" y="240" width="24" height="160" rx="4" fill="url(#spectrumGradient)" opacity="0.8"/>
    <!-- Peak 3 (tallest - main peak) -->
    <rect x="180" y="160" width="32" height="240" rx="4" fill="url(#spectrumGradient)"/>
    <!-- Peak 4 -->
    <rect x="228" y="220" width="24" height="180" rx="4" fill="url(#spectrumGradient)" opacity="0.85"/>
    <!-- Peak 5 -->
    <rect x="268" y="260" width="24" height="140" rx="4" fill="url(#spectrumGradient)" opacity="0.75"/>
    <!-- Peak 6 -->
    <rect x="308" y="300" width="24" height="100" rx="4" fill="url(#spectrumGradient)" opacity="0.6"/>
    <!-- Peak 7 -->
    <rect x="348" y="320" width="24" height="80" rx="4" fill="url(#spectrumGradient)" opacity="0.5"/>
  </g>

  <!-- Peak dots -->
  <circle cx="196" cy="160" r="8" fill="#8b5cf6" filter="url(#glow)"/>
  <circle cx="240" cy="220" r="6" fill="#3b82f6"/>

  <!-- Thermo flame icon -->
  <g transform="translate(340, 100)">
    <path
      d="M60 120 C60 60 30 40 30 0 C30 40 0 60 0 100 C0 140 25 160 60 160 C95 160 120 140 120 100 C120 60 90 40 90 0 C90 40 60 60 60 120 Z"
      fill="url(#flameGradient)"
      filter="url(#glow)"
      transform="scale(0.6)"
    />
  </g>

  <!-- Axis ticks -->
  <g stroke="#94a3b8" stroke-width="2" opacity="0.5">
    <line x1="100" y1="400" x2="100" y2="410"/>
    <line x1="180" y1="400" x2="180" y2="410"/>
    <line x1="260" y1="400" x2="260" y2="410"/>
    <line x1="340" y1="400" x2="340" y2="410"/>
    <line x1="420" y1="400" x2="420" y2="410"/>
  </g>
</svg>
