name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds (macos-latest is ARM64, macos-13 was x64 but retired)
          - os: macos-latest
            platform: macos
            arch: arm64
            artifact_name: ThermoRaw-macos-arm64
          # Windows builds
          - os: windows-latest
            platform: windows
            arch: x64
            artifact_name: ThermoRaw-windows-x64
          # Linux builds
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: ThermoRaw-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # Build frontend
      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Copy frontend to backend static
        shell: bash
        run: |
          mkdir -p apps/backend/src/thermo_raw/static
          cp -r apps/frontend/dist/* apps/backend/src/thermo_raw/static/

      # Install Linux GUI dependencies for pywebview
      - name: Install Linux GUI dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Build backend executable
      - name: Install backend dependencies
        working-directory: apps/backend
        run: |
          uv sync --extra gui
          uv pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: apps/backend
        shell: bash
        run: |
          uv run pyinstaller thermoraw.spec --clean --noconfirm

      # Package artifacts
      - name: Create DMG (macOS)
        if: matrix.platform == 'macos'
        working-directory: apps/backend/dist
        run: |
          # Install create-dmg
          brew install create-dmg

          # Create DMG with Applications symlink and nice layout
          create-dmg \
            --volname "ThermoRaw" \
            --volicon "../icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "ThermoRaw.app" 150 190 \
            --hide-extension "ThermoRaw.app" \
            --app-drop-link 450 190 \
            "${{ matrix.artifact_name }}.dmg" \
            "ThermoRaw.app" \
            || true

          # Fallback to hdiutil if create-dmg fails (e.g., no icon file)
          if [ ! -f "${{ matrix.artifact_name }}.dmg" ]; then
            echo "create-dmg failed, falling back to hdiutil"
            hdiutil create -volname "ThermoRaw" -srcfolder ThermoRaw.app -ov -format UDZO ${{ matrix.artifact_name }}.dmg
          fi

      - name: Create Installer (Windows)
        if: matrix.platform == 'windows'
        working-directory: apps/backend
        shell: pwsh
        run: |
          # Install NSIS
          choco install nsis -y

          # Create NSIS script
          @"
          !include "MUI2.nsh"

          Name "ThermoRaw"
          OutFile "dist\${{ matrix.artifact_name }}-setup.exe"
          InstallDir "`$PROGRAMFILES\ThermoRaw"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "dist\ThermoRaw\*.*"

            ; Create shortcuts
            CreateDirectory "`$SMPROGRAMS\ThermoRaw"
            CreateShortcut "`$SMPROGRAMS\ThermoRaw\ThermoRaw.lnk" "`$INSTDIR\ThermoRaw.exe"
            CreateShortcut "`$DESKTOP\ThermoRaw.lnk" "`$INSTDIR\ThermoRaw.exe"

            ; Create uninstaller
            WriteUninstaller "`$INSTDIR\Uninstall.exe"

            ; Add to Add/Remove Programs
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ThermoRaw" "DisplayName" "ThermoRaw"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ThermoRaw" "UninstallString" "`$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            RMDir /r "`$SMPROGRAMS\ThermoRaw"
            Delete "`$DESKTOP\ThermoRaw.lnk"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ThermoRaw"
          SectionEnd
          "@ | Out-File -FilePath thermoraw.nsi -Encoding ASCII

          # Build installer
          makensis thermoraw.nsi

      - name: Create release archive (Linux)
        if: matrix.platform == 'linux'
        working-directory: apps/backend/dist
        run: |
          tar -czvf ${{ matrix.artifact_name }}.tar.gz ThermoRaw

      # Upload artifacts
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/backend/dist/${{ matrix.artifact_name }}.dmg
            apps/backend/dist/${{ matrix.artifact_name }}-setup.exe
            apps/backend/dist/${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update README with download links
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Create download section content
          DOWNLOAD_SECTION=$(cat << 'EOF'
          ## Quick Start

          ### Download

          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | **macOS** | Apple Silicon (M1/M2/M3) | [ThermoRaw-macos-arm64.dmg](https://github.com/${{ github.repository }}/releases/download/VERSION_PLACEHOLDER/ThermoRaw-macos-arm64.dmg) |
          | **Windows** | x64 | [ThermoRaw-windows-x64-setup.exe](https://github.com/${{ github.repository }}/releases/download/VERSION_PLACEHOLDER/ThermoRaw-windows-x64-setup.exe) |
          | **Linux** | x64 | [ThermoRaw-linux-x64.tar.gz](https://github.com/${{ github.repository }}/releases/download/VERSION_PLACEHOLDER/ThermoRaw-linux-x64.tar.gz) |

          > See all releases: [Releases](https://github.com/${{ github.repository }}/releases)
          EOF
          )

          # Replace VERSION_PLACEHOLDER with actual version
          DOWNLOAD_SECTION="${DOWNLOAD_SECTION//VERSION_PLACEHOLDER/$VERSION}"

          # Check if README has a Quick Start section, update it
          if grep -q "## Quick Start" README.md; then
            # Use awk to replace the section
            awk -v new="$DOWNLOAD_SECTION" '
              /^## Quick Start$/ { print new; skip=1; next }
              /^## / && skip { skip=0 }
              !skip { print }
            ' README.md > README.md.tmp && mv README.md.tmp README.md
          else
            # Append after the first heading
            awk -v new="$DOWNLOAD_SECTION" '
              /^# / && !done { print; print ""; print new; done=1; next }
              { print }
            ' README.md > README.md.tmp && mv README.md.tmp README.md
          fi

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update download links to ${{ steps.version.outputs.VERSION }}"
          git push origin main || echo "No changes to push"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ThermoRaw-macos-arm64/ThermoRaw-macos-arm64.dmg
            artifacts/ThermoRaw-windows-x64/ThermoRaw-windows-x64-setup.exe
            artifacts/ThermoRaw-linux-x64/ThermoRaw-linux-x64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: |
            ## ThermoRaw ${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | **macOS** | Apple Silicon (M1/M2/M3) | `ThermoRaw-macos-arm64.dmg` |
            | **Windows** | x64 | `ThermoRaw-windows-x64-setup.exe` |
            | **Linux** | x64 | `ThermoRaw-linux-x64.tar.gz` |

            ### Installation

            - **macOS**: Open the DMG, drag ThermoRaw to Applications
            - **Windows**: Run the installer, follow the setup wizard
            - **Linux**: Extract and run `./ThermoRaw/ThermoRaw`

            ### Usage

            1. Launch the application - a native window will open
            2. Upload `.raw` or `.mzML` mass spectrometry files
            3. Explore chromatograms, spectra, and perform SNR analysis

            Data is stored in `~/ThermoRaw/data/`

            ### Platform Notes

            - **macOS**: First launch may require right-click > "Open" due to Gatekeeper
            - **Windows**: SmartScreen may show a warning - click "More info" > "Run anyway"
            - **Linux**: Make executable if needed: `chmod +x ThermoRaw/ThermoRaw`
