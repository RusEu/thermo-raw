name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  THERMO_PARSER_VERSION: "1.4.4"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds
          - os: macos-latest
            platform: macos
            arch: arm64
            artifact_name: ThermoCharts-macos-arm64
            pyinstaller_target: --target-arch arm64
          - os: macos-13
            platform: macos
            arch: x64
            artifact_name: ThermoCharts-macos-x64
            pyinstaller_target: --target-arch x86_64
          # Windows builds
          - os: windows-latest
            platform: windows
            arch: x64
            artifact_name: ThermoCharts-windows-x64
            pyinstaller_target: ""
          # Linux builds
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: ThermoCharts-linux-x64
            pyinstaller_target: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # Download ThermoRawFileParser
      - name: Download ThermoRawFileParser
        shell: bash
        run: |
          mkdir -p apps/backend/vendor/${{ matrix.platform }}
          curl -L -o parser.zip "https://github.com/compomics/ThermoRawFileParser/releases/download/v${{ env.THERMO_PARSER_VERSION }}/ThermoRawFileParser${{ env.THERMO_PARSER_VERSION }}.zip"
          unzip -o parser.zip -d parser_temp

          # Find and copy the executable
          if [ "${{ matrix.platform }}" == "windows" ]; then
            cp parser_temp/ThermoRawFileParser.exe apps/backend/vendor/windows/
          else
            # For macOS/Linux - ThermoRawFileParser needs mono runtime
            # Copy the .exe and we'll handle mono at runtime
            if [ -f parser_temp/ThermoRawFileParser.exe ]; then
              cp parser_temp/ThermoRawFileParser.exe apps/backend/vendor/${{ matrix.platform }}/ThermoRawFileParser
              chmod +x apps/backend/vendor/${{ matrix.platform }}/ThermoRawFileParser || true
            fi
          fi
          rm -rf parser.zip parser_temp

      # Build frontend
      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Copy frontend to backend static
        shell: bash
        run: |
          mkdir -p apps/backend/src/thermo_stats/static
          cp -r apps/frontend/dist/* apps/backend/src/thermo_stats/static/

      # Build backend executable
      - name: Install backend dependencies
        working-directory: apps/backend
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: apps/backend
        shell: bash
        run: |
          uv run pyinstaller thermocharts.spec --clean --noconfirm ${{ matrix.pyinstaller_target }}

      # Package artifacts
      - name: Create release archive (macOS)
        if: matrix.platform == 'macos'
        working-directory: apps/backend/dist
        run: |
          zip -r ${{ matrix.artifact_name }}.zip ThermoCharts.app

      - name: Create release archive (Windows)
        if: matrix.platform == 'windows'
        working-directory: apps/backend/dist
        shell: pwsh
        run: |
          Compress-Archive -Path ThermoCharts.exe -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Create release archive (Linux)
        if: matrix.platform == 'linux'
        working-directory: apps/backend/dist
        run: |
          tar -czvf ${{ matrix.artifact_name }}.tar.gz ThermoCharts

      # Upload artifacts
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/backend/dist/${{ matrix.artifact_name }}.zip
            apps/backend/dist/${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update README with download links
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Create download section content
          DOWNLOAD_SECTION=$(cat << 'EOF'
          ## Quick Start

          ### Download

          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | **macOS** | Apple Silicon (M1/M2/M3) | [ThermoCharts-macos-arm64.zip](https://github.com/${{ github.repository }}/releases/download/VERSION_PLACEHOLDER/ThermoCharts-macos-arm64.zip) |
          | **macOS** | Intel | [ThermoCharts-macos-x64.zip](https://github.com/${{ github.repository }}/releases/download/VERSION_PLACEHOLDER/ThermoCharts-macos-x64.zip) |
          | **Windows** | x64 | [ThermoCharts-windows-x64.zip](https://github.com/${{ github.repository }}/releases/download/VERSION_PLACEHOLDER/ThermoCharts-windows-x64.zip) |
          | **Linux** | x64 | [ThermoCharts-linux-x64.tar.gz](https://github.com/${{ github.repository }}/releases/download/VERSION_PLACEHOLDER/ThermoCharts-linux-x64.tar.gz) |

          > See all releases: [Releases](https://github.com/${{ github.repository }}/releases)
          EOF
          )

          # Replace VERSION_PLACEHOLDER with actual version
          DOWNLOAD_SECTION="${DOWNLOAD_SECTION//VERSION_PLACEHOLDER/$VERSION}"

          # Check if README has a Quick Start section, update it
          if grep -q "## Quick Start" README.md; then
            # Use awk to replace the section
            awk -v new="$DOWNLOAD_SECTION" '
              /^## Quick Start$/ { print new; skip=1; next }
              /^## / && skip { skip=0 }
              !skip { print }
            ' README.md > README.md.tmp && mv README.md.tmp README.md
          else
            # Append after the first heading
            awk -v new="$DOWNLOAD_SECTION" '
              /^# / && !done { print; print ""; print new; done=1; next }
              { print }
            ' README.md > README.md.tmp && mv README.md.tmp README.md
          fi

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update download links to ${{ steps.version.outputs.VERSION }}"
          git push origin main || echo "No changes to push"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ThermoCharts-macos-arm64/ThermoCharts-macos-arm64.zip
            artifacts/ThermoCharts-macos-x64/ThermoCharts-macos-x64.zip
            artifacts/ThermoCharts-windows-x64/ThermoCharts-windows-x64.zip
            artifacts/ThermoCharts-linux-x64/ThermoCharts-linux-x64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: |
            ## ThermoCharts ${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | **macOS** | Apple Silicon (M1/M2/M3) | `ThermoCharts-macos-arm64.zip` |
            | **macOS** | Intel x64 | `ThermoCharts-macos-x64.zip` |
            | **Windows** | x64 | `ThermoCharts-windows-x64.zip` |
            | **Linux** | x64 | `ThermoCharts-linux-x64.tar.gz` |

            ### Installation

            1. Download the appropriate file for your platform and architecture
            2. Extract the archive
            3. Run the application:
               - **macOS**: Double-click `ThermoCharts.app`
               - **Windows**: Double-click `ThermoCharts.exe`
               - **Linux**: Run `./ThermoCharts` in terminal

            ### Usage

            1. The application starts a local server and opens your browser to http://localhost:8000
            2. Upload `.raw` or `.mzML` mass spectrometry files
            3. Explore chromatograms, spectra, and perform SNR analysis

            Data is stored in `~/ThermoCharts/data/`

            ### Platform Notes

            - **macOS**: First launch may require right-click > "Open" due to Gatekeeper
            - **Windows**: SmartScreen may show a warning for unsigned executables - click "More info" > "Run anyway"
            - **Linux**: Make executable if needed: `chmod +x ThermoCharts`
